services:

  app:
    build: .
    container_name: home-portal
    restart: unless-stopped
    volumes:
      - ${DATA_PATH}/static:/app/static
      - ${DATA_PATH}/data:/app/data
    expose:
      - "8000"
    environment:
      - TZ=${TZ}
    networks:
      - portal-net

  nginx:
    image: nginx:alpine
    container_name: home-portal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - portal-net

networks:
  portal-net:
    name: home-portal
