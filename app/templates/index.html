<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Home Portal</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Home Portal</h1>
      <p>Your self-hosted starting point.</p>
    </header>

    <h2>Quick Links</h2>
    <div class="links-grid">
      <a class="link-card" href="#">
        <span class="icon">🗄️</span>
        <span class="name">NAS</span>
        <span class="desc">File server</span>
      </a>
      <a class="link-card" href="#">
        <span class="icon">📡</span>
        <span class="name">Router</span>
        <span class="desc">Network admin</span>
      </a>
      <a class="link-card" href="#">
        <span class="icon">🎬</span>
        <span class="name">Media Server</span>
        <span class="desc">Movies &amp; shows</span>
      </a>
      <a class="link-card" href="#">
        <span class="icon">📷</span>
        <span class="name">Photo Album</span>
        <span class="desc">Family photos</span>
      </a>
    </div>

    <h2>Family Album</h2>
    <p class="album-note">Demo content, replace with your own photos once configured.</p>
    <div class="album-grid">
      <figure>
        <img src="/static/img/demo-photo-1.jpg" alt="Demo photo 1: Beach Day">
        <figcaption>Beach Day</figcaption>
      </figure>
      <figure>
        <img src="/static/img/demo-photo-2.jpg" alt="Demo photo 2: Mountain Hike">
        <figcaption>Mountain Hike</figcaption>
      </figure>
      <figure>
        <img src="/static/img/demo-photo-3.jpg" alt="Demo photo 3: Garden BBQ">
        <figcaption>Garden BBQ</figcaption>
      </figure>
      <figure>
        <img src="/static/img/demo-photo-4.jpg" alt="Demo photo 4: Birthday">
        <figcaption>Birthday</figcaption>
      </figure>
    </div>
  </div>
</body>
</html>
